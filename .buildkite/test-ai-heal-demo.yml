steps:
  - label: ":robot_face: Momentic classify + heal demo"
    key: "momentic-ai-heal-demo"
    command: ".buildkite/scripts/test-ai-heal-demo.sh"
    agents:
      queue: "linux-small"
    timeout_in_minutes: 25
    artifact_paths:
      - "web/test-results/autoheal-demo/**/*"
    secrets:
      MOMENTIC_API_KEY: "MOMENTIC_API_KEY"
    env:
      MOMENTIC_HEAL_TIMEOUT_MINUTES: "10"
      MOMENTIC_EXIT_ON_TEST_FAILURE: "0"
