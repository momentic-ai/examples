name: Test PR

env:
  MOMENTIC_API_KEY: ${{ secrets.MOMENTIC_API_KEY }}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  run-web-tests:
    name: Run web tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-test
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Install app dependencies
        run: npm --prefix ../ ci
      - name: Install testing dependencies
        run: npm ci
      - name: Install headless browsers for automation
        # Choose which browsers you want to install, see https://momentic.ai/docs/browsers
        run: npx momentic install-browsers chromium
      - name: Run tests
        run: npx momentic run .
      - name: Upload test results artifact to Momentic Cloud
        run: npx momentic results upload test-results
        if: always()

  run-android-tests:
    name: Run android tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-test
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Run tests
        run: npx momentic-mobile run --upload-results .
      - name: Upload test results artifact to Momentic Cloud
        run: npx momentic results upload test-results
        if: always()
