name: Test prod

env:
  MOMENTIC_API_KEY: ${{ secrets.MOMENTIC_API_KEY }}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  run-webs:
    name: Run web tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Queue remote test runs
        run: npx momentic queue tests standard-user-purchases cart-and-sorting-behavior

  run-androids:
    name: Run android tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Run tests
        run: npx momentic-mobile run .