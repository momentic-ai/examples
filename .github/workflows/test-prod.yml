name: Test prod

env:
  MOMENTIC_API_KEY: ${{ secrets.MOMENTIC_API_KEY }}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  run-web-tests:
    name: Run web tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web-test
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 21
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Queue remote test runs
        run: npx momentic queue tests standard-user-purchases cart-and-sorting-behavior

  run-android-tests:
    name: Run android tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android-test
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 21
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Queue remote test runs
        run: npx momentic-mobile app
