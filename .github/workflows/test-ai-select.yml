name: AI-selected tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  MOMENTIC_API_KEY: ${{ secrets.MOMENTIC_API_KEY }}

jobs:
  run-tests:
    name: Run AI-selected tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # AI Select needs the base commit and full diff, not a shallow checkout.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install code-index tools
        run: npx momentic@latest install-codetools
      - name: Restore code index
        uses: actions/cache@v4
        with:
          path: ~/.momentic/cache/
          key: momentic-code-index-v1-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            momentic-code-index-v1-${{ runner.os }}-

      # Standalone mode only computes and prints the selection; it does not run tests.
      # On a PR, AI Select compares merge-base(origin/<PR base>, HEAD)..HEAD so the
      # selection covers the whole PR. On a push to main, it compares the push
      # event's before SHA..HEAD so the selection covers only commits in that push.
      - name: Preview selected tests
        working-directory: web
        run: npx momentic@latest ai select --json

      - name: Install browser
        run: npx momentic@latest install-browsers chromium

      # Execution mode resolves the same diff range, then runs the selected subset.
      # If AI Select cannot produce a safe selection, `run --ai-select` falls open
      # and runs the full in-scope test set instead.
      - name: Run selected tests
        working-directory: web
        run: npx momentic@latest run . --ai-select
      # A valid zero-test selection creates no runs directory, so there is nothing to upload.
      - name: Upload test results
        if: ${{ always() && hashFiles('web/test-results/runs/**') != '' }}
        working-directory: web
        run: npx momentic@latest results upload test-results
