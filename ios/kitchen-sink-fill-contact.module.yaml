fileType: momentic/mobile-module/v2
id: 8d4f5e80-3a52-4f0e-8b9d-2d3c1a4f5e80
version: 0.0.4
platform: ios
description: Fill out a new contact form on the iOS Contacts app.
parameters:
  parameterNames:
    - FIRST_NAME
    - LAST_NAME
    - GREETING
  defaultParameters:
    FIRST_NAME: '"KitchenSink"'
    LAST_NAME: '"Demo"'
    GREETING: "`hello ${env.FIRST_NAME}`"
steps:
  - javascript:
      code: return env.GREETING
      saveAs: KS_GREETING_ECHO
  - type:
      text: "{{ env.FIRST_NAME }}"
      into: First name input
      clearContent: true
      keyPressDelay: 10
  - type:
      text: "{{ env.LAST_NAME }}"
      into: Last name input
  - type:
      text: Momentic
      into: Company input
  - scrollTo:
      on: add phone
      in: app
      scrollStepPercent: 100
  - tap: add phone
  - type:
      text: "9194089905"
      into: add phone
