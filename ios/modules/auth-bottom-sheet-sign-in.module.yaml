  - id: 4cd6941a-a4ef-4049-9eff-479784449221
    type: MOBILE_PRESET_STEP
    command:
      id: 55f820e7-2cf3-4b21-a3d5-9f5eab5f7818
      type: TAP
      target:
        type: description
        description: Tap the "Continue" button
  - id: deea46f2-6c86-4892-9831-e08c833911a2
    type: MOBILE_PRESET_STEP
    command:
      id: 10a9a600-3572-42bb-9b31-6b302497c7f7
      type: WAIT
      timeoutSecs: 5
  - id: c2bd3168-ba32-4d5f-a1a7-e9831658bbb8
    envKey: SIGN_IN_CODE
    type: MOBILE_PRESET_STEP
    command:
      id: e3a859ee-5f1e-4dfa-8fe6-0b9082d66ee7
      type: JAVASCRIPT
      code: |-
        const msg = await sms.fetchLatest({
          to: "+13186531449",
        });

        // Full message body
        const body = msg.body;

        // Extract 6-digit verification code using regex
        const match = body.match(/\b\d{6}\b/);

        const verificationCode = match ? match[0] : null;

        return verificationCode;
  - id: 9f2bf89c-8702-4f14-97b7-f1cd4ef87c45
    envKey: MSG_BODY
    type: MOBILE_PRESET_STEP
    command:
      id: e3a859ee-5f1e-4dfa-8fe6-0b9082d66ee7
      type: JAVASCRIPT
      code: |-
        const msg = await sms.fetchLatest({
          to: "+13186531449",
        });
        return msg.body;
