name: swag-labs
include:
  - "**/*.test.yaml"
  - "**/*.module.yaml"
environments:
  - name: production
    baseUrl: https://www.saucedemo.com/
    envVariables:
      USERNAME: standard_user
      PASSWORD: secret_sauce
ai:
  useMemory: true
  failureRecovery: true
  classification:
    enabled: true
  agentConfig:
    locator: v3
    assertion: v3
    text-extraction: v3
    visual-assertion: v3
    failure-recovery: v2
browser:
  showZeroOpacityElements: false
  disableSecondaryCacheResolution: false
  globalLocatorRedirect: true
  visualActions: true
  autoExpandIframes: true
advanced:
  fakerConstantSeed: false
fileFormat: v2
