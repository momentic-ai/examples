fileType: momentic/test/v2
id: 41e55e84-4c74-4704-8159-d4155ef01058
version: 1.0.24
url: https://saucedemo.com
description: End-to-end checkout flow
defaultEnv: production
disabled: false
retries: 1
viewport: 1920, 1080
browserType: Chromium
disableJavaScript: false
colorScheme: dark
steps:
  - module: ./log-in-username-password.module.yaml
  - module:
      inputs:
        ITEM:
          string: sauce labs backpack
      path: ./add-item-to-cart.module.yaml
  - module:
      inputs:
        ITEM:
          string: sauce labs onesie
      path: ./add-item-to-cart.module.yaml
  - click: Cart icon on the top right of the page
  - assert: Verify that both the backpack and the onesie is in the cart
  - click: Checkout button
  - module: ./fill-out-personal-info.module.yaml
  - click: Continue button
  - assert: Verify the item total matches the amount listed for each item
  - assert: Verify the total matches item total + tax
  - click: Finish button
