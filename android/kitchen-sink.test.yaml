fileType: momentic/mobile-test/v2
id: 38643986-286c-48c5-928a-26c7aab32d05
version: 0.0.4
description: >-
  Kitchen-sink demo that exercises every Android mobile step type and every
  variant of each step. Uses the Google Contacts app as a test surface. Skipped
  steps are syntax-only references for variants that require manual fixtures.
platform: android
retries: 0
defaultChannel: android
emulator:
  waitForStability: true
labels:
  - kitchen-sink
before:
  - javascript:
      code: return faker.string.uuid()
      saveAs: SESSION_ID
  - javascript:
      code: return `KitchenSink-${faker.string.alpha(5)}`
      saveAs: FIRST_NAME
steps:
  # ---------------------------------------------------------------
  # openApp - shorthand (package only) + detailed (package + activity)
  # ---------------------------------------------------------------
  - openApp: com.google.android.contacts
  - openApp:
      package: com.google.android.contacts
      activity: ""
  - wait: 1000
  # ---------------------------------------------------------------
  # Module invocations - bare, with inputs, with javascript-valued inputs
  # ---------------------------------------------------------------
  - module: ./kitchen-sink-variants.module.yaml
  - module:
      path: ./kitchen-sink-fill-contact.module.yaml
      inputs:
        FIRST_NAME: "{{ env.FIRST_NAME }}"
        LAST_NAME:
          string: Demo
        GREETING:
          javascript: return `module saw ${env.FIRST_NAME}`
  # ---------------------------------------------------------------
  # Tap - shorthand string, percent-pair shorthand, detailed
  # ---------------------------------------------------------------
  - tap: New contact button
  - tap: "50%, 50%"
  - tap:
      on: New contact button
      iterations: 1
      tapDelay: 5
      offset: 4, 8
  - tap:
      on: New contact button
      longPress: true
      longPressDuration: 500
  - tap:
      on: New contact button
      skipped: true
      comment: variant kept for reference; skipped to avoid double-press
  # ---------------------------------------------------------------
  # Type - shorthand + detailed + clear/force variants
  # ---------------------------------------------------------------
  - type:
      text: hello kitchen sink
      into: First name input
      clearContent: true
      keyPressDelay: 5
  - type:
      text: " v2"
      into: First name input
      clearContent: false
  - type:
      text: another
      into: Last name input
      forceClearContent: true
  - type:
      text: from focus
      skipped: true
      comment: type without `into` types into the currently-focused field
  # ---------------------------------------------------------------
  # Press (physical button) - shorthand + detailed for each value
  # ---------------------------------------------------------------
  - press: back
  - press: home
  - press: power
  - press: volume_up
  - press: volume_down
  - press: volume_mute
  - press:
      key: back
      longPress: true
  # ---------------------------------------------------------------
  # PressKey (keyboard) - shorthand + detailed for each value
  # ---------------------------------------------------------------
  - pressKey: enter
  - pressKey: backspace
  - pressKey: close_keyboard
  - pressKey:
      key: enter
  - pressKey:
      key: backspace
  - pressKey:
      key: close_keyboard
  # ---------------------------------------------------------------
  # Re-open the contacts app for the rest of the flow
  # ---------------------------------------------------------------
  - openApp:
      package: com.google.android.contacts
      activity: ""
  # ---------------------------------------------------------------
  # Swipe - all four directions, shorthand + detailed + custom coords container
  # ---------------------------------------------------------------
  - swipe: up
  - swipe: down
  - swipe: left
  - swipe: right
  - swipe:
      direction: up
      in: screen
      viewportPercent: 80
      duration: 400
  - swipe:
      direction: down
      in: app
      viewportPercent: "60%"
      offset: 0, 0
  - swipe:
      direction: left
      in: webview
  - swipe:
      direction: right
      in: contact list
  - swipe:
      direction: down
      in:
        x: 100
        y: 200
        delta: 400
  # ---------------------------------------------------------------
  # ScrollTo - shorthand + detailed, optional direction + container
  # ---------------------------------------------------------------
  - scrollTo: Save button
  - scrollTo:
      on: Save button
      in: screen
      scrollStepPercent: 100
      maxScrollAttempts: 5
  - scrollTo:
      on: Save button
      direction: down
      in: app
  - scrollTo:
      on: Save button
      direction: up
      in:
        x: 100
        y: 800
        delta: 400
  # ---------------------------------------------------------------
  # Tap save and verify
  # ---------------------------------------------------------------
  - tap: Save button
  # ---------------------------------------------------------------
  # Screen checks - shorthand + detailed, both polarities
  # ---------------------------------------------------------------
  - checkScreenContains: "{{ env.FIRST_NAME }}"
  - checkScreenContains:
      text: "{{ env.FIRST_NAME }}"
      timeout: 10000
  - checkScreenDoesNotContain: this-text-should-never-appear
  - checkScreenDoesNotContain:
      text: another-never-present
      timeout: 5000
  # ---------------------------------------------------------------
  # Element checks - every alias in the cartesian product
  # ---------------------------------------------------------------
  # element subject (existence-style conditions)
  - checkElementExists: KitchenSink contact entry
  - checkElementExists:
      on: KitchenSink contact entry
      timeout: 5000
  - checkElementDoesNotExist: a button labeled "definitely not real"
  - checkElementVisible: KitchenSink contact entry
  - checkElementNotVisible: a button labeled "definitely not real"
  - checkElementEnabled: KitchenSink contact entry
  - checkElementNotEnabled:
      on: KitchenSink contact entry
      skipped: true
  - checkElementEditable:
      on: KitchenSink contact entry
      skipped: true
  - checkElementNotEditable: KitchenSink contact entry
  - checkElementFocused:
      on: KitchenSink contact entry
      skipped: true
  - checkElementNotFocused: KitchenSink contact entry
  # content subject
  - checkElementContentExists: KitchenSink contact entry
  - checkElementContentDoesNotExist:
      on: a heading labeled "definitely not real"
      skipped: true
  - checkElementContentContains:
      on: KitchenSink contact entry
      value: KitchenSink
  - checkElementContentDoesNotContain:
      on: KitchenSink contact entry
      value: nothing-matches-this
  - checkElementContentEquals:
      on: KitchenSink contact entry
      value: "{{ env.FIRST_NAME }} Demo"
      skipped: true
  - checkElementContentDoesNotEqual:
      on: KitchenSink contact entry
      value: another-name
  - checkElementContentStartsWith:
      on: KitchenSink contact entry
      value: KitchenSink
  - checkElementContentDoesNotStartWith:
      on: KitchenSink contact entry
      value: Other
  # attribute subject - requires `name`
  - checkElementAttributeExists:
      on: KitchenSink contact entry
      name: text
  - checkElementAttributeDoesNotExist:
      on: KitchenSink contact entry
      name: nonexistent-attribute
  - checkElementAttributeContains:
      on: KitchenSink contact entry
      name: text
      value: KitchenSink
  - checkElementAttributeDoesNotContain:
      on: KitchenSink contact entry
      name: text
      value: not-here
  - checkElementAttributeEquals:
      on: KitchenSink contact entry
      name: text
      value: "{{ env.FIRST_NAME }} Demo"
      skipped: true
  - checkElementAttributeDoesNotEqual:
      on: KitchenSink contact entry
      name: text
      value: other-value
  - checkElementAttributeStartsWith:
      on: KitchenSink contact entry
      name: text
      value: Kitchen
  - checkElementAttributeDoesNotStartWith:
      on: KitchenSink contact entry
      name: text
      value: Other
  # tag_name subject (alias prefix "Name")
  - checkElementNameExists: KitchenSink contact entry
  - checkElementNameDoesNotExist:
      on: a button labeled "definitely not real"
      skipped: true
  - checkElementNameContains:
      on: KitchenSink contact entry
      value: TextView
      skipped: true
  - checkElementNameDoesNotContain:
      on: KitchenSink contact entry
      value: ImageView
  - checkElementNameEquals:
      on: KitchenSink contact entry
      value: android.widget.TextView
      skipped: true
  - checkElementNameDoesNotEqual:
      on: KitchenSink contact entry
      value: android.widget.ImageView
  - checkElementNameStartsWith:
      on: KitchenSink contact entry
      value: android.widget
      skipped: true
  - checkElementNameDoesNotStartWith:
      on: KitchenSink contact entry
      value: ios.widget
  # style subject - requires `name`
  - checkElementStyleExists:
      on: KitchenSink contact entry
      name: enabled
  - checkElementStyleDoesNotExist:
      on: KitchenSink contact entry
      name: nonexistent-style
  - checkElementStyleContains:
      on: KitchenSink contact entry
      name: enabled
      value: "true"
      skipped: true
  - checkElementStyleDoesNotContain:
      on: KitchenSink contact entry
      name: enabled
      value: "false"
  - checkElementStyleEquals:
      on: KitchenSink contact entry
      name: enabled
      value: "true"
      skipped: true
  - checkElementStyleDoesNotEqual:
      on: KitchenSink contact entry
      name: enabled
      value: "false"
  - checkElementStyleStartsWith:
      on: KitchenSink contact entry
      name: enabled
      value: "tr"
      skipped: true
  - checkElementStyleDoesNotStartWith:
      on: KitchenSink contact entry
      name: enabled
      value: "fa"
  # ---------------------------------------------------------------
  # Assert (AI) - shorthand + detailed
  # ---------------------------------------------------------------
  - assert: a contact with the kitchen sink name appears in the list
  - assert:
      that: a contact with the kitchen sink name appears in the list
      timeout: 10000
  # ---------------------------------------------------------------
  # Extract (AI) - shorthand + detailed
  # ---------------------------------------------------------------
  - extract: Extract the visible contact name
  - extract:
      goal: Extract the contact name and phone number
      schema:
        type: object
        properties:
          name:
            type: string
          phone:
            type: string
        required:
          - name
          - phone
      saveAs: CONTACT
  - javascript: assert(typeof env.CONTACT.name === "string")
  # ---------------------------------------------------------------
  # Drag and drop
  # ---------------------------------------------------------------
  - dragAndDrop:
      from: KitchenSink contact entry
      to: Star button
      hoverDuration: 200
      dragDuration: 500
      skipped: true
  # ---------------------------------------------------------------
  # AI action (act) - shorthand + detailed
  # ---------------------------------------------------------------
  - act: confirm the kitchen sink contact is starred without changing anything
  - act:
      goal: confirm the kitchen sink contact is starred without changing anything
      version: "2"
  # ---------------------------------------------------------------
  # Conditionals (if) - every assertion type at the top level
  # ---------------------------------------------------------------
  - if:
      assert: the contact list is visible
      then:
        - checkScreenContains: "{{ env.FIRST_NAME }}"
  - if:
      checkScreenContains: "{{ env.FIRST_NAME }}"
      then:
        - checkElementVisible: KitchenSink contact entry
  - if:
      checkScreenDoesNotContain: this-string-should-never-appear
      then:
        - checkElementVisible: KitchenSink contact entry
  - if:
      checkElementExists: KitchenSink contact entry
      then:
        - checkElementVisible: KitchenSink contact entry
  - if:
      checkElementVisible: KitchenSink contact entry
      then:
        - checkScreenContains: "{{ env.FIRST_NAME }}"
  - if:
      checkElementContentContains:
        on: KitchenSink contact entry
        value: KitchenSink
      then:
        - checkElementVisible: KitchenSink contact entry
  - if:
      javascript: return env.SESSION_ID.length > 0
      then:
        - wait: 100
  # ---------------------------------------------------------------
  # Wait - shorthand + detailed
  # ---------------------------------------------------------------
  - wait: 250
  - wait:
      ms: 100
  # ---------------------------------------------------------------
  # JavaScript - shorthand + detailed
  # ---------------------------------------------------------------
  - javascript: return env.SESSION_ID
  - javascript:
      code: return env.SESSION_ID
      timeout: 5000
      saveAs: SESSION_ECHO
  # ---------------------------------------------------------------
  # HTTP request - shorthand + detailed (GET + POST with body)
  # ---------------------------------------------------------------
  - request: https://postman-echo.com/get
  - request:
      url: https://postman-echo.com/get
      method: GET
      headers:
        x-test: kitchen-sink-{{ env.SESSION_ID }}
      params:
        source: kitchen-sink-android
      timeout: 15000
      saveAs: HTTP_GET
  - javascript: assert(env.HTTP_GET.status === 200)
  - request:
      url: https://postman-echo.com/post
      method: POST
      headers:
        x-test: kitchen-sink-android
      body: '{"sessionId":"{{ env.SESSION_ID }}"}'
      bodyType: json
      timeout: 15000
      saveAs: HTTP_POST
  - javascript: assert(env.HTTP_POST.status === 200)
  # ---------------------------------------------------------------
  # Rotate orientation - shorthand + detailed, both values
  # ---------------------------------------------------------------
  - rotate: landscape
  - rotate: portrait
  - rotate:
      orientation: landscape
  - rotate:
      orientation: portrait
  # ---------------------------------------------------------------
  # Appium passthrough
  # ---------------------------------------------------------------
  - appium:
      script: mobile:scroll
      args: '{"direction":"down"}'
  - appium:
      script: mobile:scrollBackTo
      args: '{"elementId":"42"}'
      skipped: true
  # ---------------------------------------------------------------
  # ADB (Android only) - shorthand + detailed
  # ---------------------------------------------------------------
  - adb: shell input keyevent 4
  - adb:
      command: shell
      args: dumpsys battery
  # ---------------------------------------------------------------
  # Toggle settings (Android only) - shorthand + detailed for each
  # ---------------------------------------------------------------
  - toggleSettings: wifi
  - toggleSettings: data
  - toggleSettings: airplane_mode
  - toggleSettings: location
  - toggleSettings:
      setting: wifi
  - toggleSettings:
      setting: airplane_mode
  # ---------------------------------------------------------------
  # Notifications (Android only)
  # ---------------------------------------------------------------
  - openNotifications
  - press: back
  # ---------------------------------------------------------------
  # File transfer + app install (Android only) - kept for syntax reference
  # ---------------------------------------------------------------
  - addFile:
      path: ./fixtures/payload.txt
      location: /sdcard/Download/payload.txt
      skipped: true
  - installApp:
      path: ./fixtures/app-debug.apk
      skipped: true
  - uninstallApp:
      package: com.example.app
      skipped: true
  # ---------------------------------------------------------------
  # Debug + teardown
  # ---------------------------------------------------------------
  - debugState
  - killApp
after:
  - javascript:
      code: return "android kitchen-sink teardown"
      saveAs: TEARDOWN
